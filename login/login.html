<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AeroViagens</title>

     <!-- icone da guia -->
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">

    <!-- css -->
     <link rel="stylesheet" href="stylelogin.css">

    <!-- icones -->
    <script src="https://kit.fontawesome.com/a905c455a5.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- inicio do cabeçalho -->
    <header>
        <!-- logo e nome -->
        <div class="div1-header">
            <img src="/img/logo.png" alt="logo">
            <h1>AeroViagens</h1>
        </div>
    </header>

    <main>
        <section class="">
            <div>
                    <img src="/img/logo.png" alt="">
                    <h2>Faça seu login</h2>
                    <form action="">
                        <label for="">Email</label>
                        <input type="email" required placeholder="Digite seu email">
                        <label for="">Senha</label>
                        <input type="password" required placeholder="Digite sua senha">
                        <input type="submit">
                    </form>
            </div>
        </section>

    </main>
    
</body>
</html>
